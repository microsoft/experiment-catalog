name: "CodeQL"

on:
  workflow_dispatch: # Disabled automatic triggers until CodeQL is ready for this repo

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [csharp, javascript, python]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v3
        with:
          languages: ${{ matrix.language }}

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Build C# projects
        if: matrix.language == 'csharp'
        run: |
          dotnet build catalog/exp-catalog.csproj
          dotnet build evaluator/evaluator.csproj

      - name: Autobuild
        if: matrix.language != 'csharp'
        uses: github/codeql-action/autobuild@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v3
        with:
          category: "/language:${{ matrix.language }}"
