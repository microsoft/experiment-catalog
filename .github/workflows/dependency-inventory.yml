name: Dependency Inventory

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * 1"
  push:
    branches: [main]
    paths:
      - "catalog/**"
      - "catalog.tests/**"
      - "ui/**"
      - "scripts/compliance/**"
      - ".github/workflows/dependency-inventory.yml"

permissions: read-all

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"

      - name: Generate dependency inventory
        run: bash scripts/compliance/export_dependency_inventory.sh

      - name: Upload dependency inventory artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-inventory
          path: artifacts/dependency-inventory/
          retention-days: 14
