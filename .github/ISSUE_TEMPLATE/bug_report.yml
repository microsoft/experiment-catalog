name: Bug report
description: Report a reproducible defect in the catalog, evaluator, or UI
labels:
  - kind:bug
  - status:needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include enough detail for a maintainer to reproduce quickly.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: API returns 500 when calculating statistics
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - area:api
        - area:ui
        - area:governance
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Numbered steps to reproduce
      placeholder: |
        1. Run make setup
        2. Start the API
        3. Call endpoint X
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Include trace_id or run_id if available
      render: text
